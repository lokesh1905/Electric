<!DOCTYPE html>
<html lang="en" data-theme="aurora">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3b63d9">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Electric Shop — Rate Book (Pro)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ----- THEMES ----- */
:root {
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 20px rgba(0,0,0,0.08);
  --transition: all 0.2s ease;
}
[data-theme="slate"] {
  --bg-base: #f1f5f9;
  --bg-surface: #ffffff;
  --bg-elevated: #f8fafc;
  --border: #e2e8f0;
  --accent: #1e40af;
  --accent-light: #eff6ff;
  --accent-glow: rgba(30,64,175,0.15);
  --text: #0f172a;
  --text2: #334155;
  --muted: #64748b;
  --success: #0f7b3a;
  --success-light: #eaf8ef;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --sell: #0f7b3a;
  --sell-light: #eaf8ef;
  --sell-glow: rgba(15,123,58,0.2);
  --gold: #d97706;
}
[data-theme="aurora"] {
  --bg-base: #eef2ff;
  --bg-surface: #ffffff;
  --bg-elevated: #fafcff;
  --border: #d9e2f5;
  --accent: #0f2b3d;
  --accent-light: #eef7ff;
  --accent-glow: rgba(15,43,61,0.12);
  --text: #0a2540;
  --text2: #2c3e50;
  --muted: #5e7c97;
  --success: #1f8a4c;
  --success-light: #e3f9ee;
  --danger: #e25c5c;
  --danger-light: #fff1f0;
  --sell: #1f8a4c;
  --sell-light: #e3f9ee;
  --sell-glow: rgba(31,138,76,0.2);
  --gold: #e2a13f;
}
[data-theme="ember"] {
  --bg-base: #2c1a1a;
  --bg-surface: #3e2a2a;
  --bg-elevated: #4f3838;
  --border: #684e4e;
  --accent: #ff8c42;
  --accent-light: #4a3028;
  --accent-glow: rgba(255,140,66,0.25);
  --text: #ffefd9;
  --text2: #fad4b3;
  --muted: #c7a58a;
  --success: #66cc8a;
  --success-light: #283b2a;
  --danger: #ff7b72;
  --danger-light: #542a25;
  --sell: #66cc8a;
  --sell-light: #283b2a;
  --sell-glow: rgba(102,204,138,0.25);
  --gold: #ffb347;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-base);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.25s, color 0.25s;
}

/* ----- HEADER ----- */
header {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 0 18px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 18px;
}
.logo-icon {
  width: 34px;
  height: 34px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-icon svg { width: 18px; height: 18px; fill: #fff; }
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.item-count {
  background: var(--accent-light);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--accent-glow);
  font-family: 'JetBrains Mono', monospace;
}
.icon-btn {
  width: 34px;
  height: 34px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.icon-btn:hover { border-color: var(--accent); background: var(--accent-light); }

/* ----- TABS (mobile bottom bar) ----- */
.tabs {
  display: flex;
  background: var(--bg-surface);
  border-bottom: 2px solid var(--border);
  padding: 6px 8px 0;
  gap: 4px;
}
.tab {
  flex: 1;
  padding: 10px 4px 10px;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  border-radius: 6px 6px 0 0;
  transition: all 0.2s;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: transparent;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--accent-light);
}

/* ----- PANELS ----- */
.panel { display: none; }
.panel.active { display: block; }

/* ----- CARD ----- */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  width: 100%;
  box-sizing: border-box;
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}
label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.6px;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 7px;
}
input, textarea, select {
  width: 100%;
  background: var(--bg-base);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  outline: none;
  transition: all 0.2s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  background: var(--bg-surface);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.form-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.price-wrap { position: relative; }
.price-prefix {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  pointer-events: none;
}
.price-wrap input { padding-left: 28px; }
.save-btn {
  width: 100%;
  padding: 17px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-lg);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px var(--accent-glow);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.save-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

/* ----- FILTER CHIPS ----- */
.filter-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-bottom: 14px;
  padding-bottom: 2px;
}
.filter-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
}
.filter-chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ----- ITEM CARD ----- */
/* Compact item card with better alignment */
.item-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  margin-bottom: 10px;
  transition: var(--transition);
  width: 100%;
  box-sizing: border-box;
}

.item-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}

/* Card header row - perfect alignment */
.item-card-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

/* Checkbox wrapper for proper vertical alignment */
.item-checkbox-wrapper {
  flex-shrink: 0;
  padding-top: 2px;
}
.item-view {
  flex-shrink: 0;
  font-size: 18px;
  cursor: pointer;
  padding: 2px 4px;
  line-height: 1;
  transition: transform 0.1s ease;
  color: var(--accent);
  margin-left: 4px;
}

.item-view:hover {
  transform: scale(1.1);
}
.item-checkbox {
  width: 18px;
  height: 18px;
  cursor: pointer;
  margin: 0;
  transform: scale(1);
  accent-color: var(--accent);
}

/* Main content area - takes remaining space */
.item-card-content {
  flex: 1;
  min-width: 0; /* Prevents overflow */

}

/* Title row with name and brand */
.item-title-row {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}

.item-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  line-height: 1.3;
}

.item-brand {
  font-weight: 400;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.3px;
}

/* Price row with arrow separator */
.item-price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
}

.price-buy {
  color: var(--accent);
}

.price-sep {
  color: var(--muted);
  font-size: 11px;
}

.price-sell {
  color: var(--success);
  font-weight: 600;
}

/* Meta row with category and update date */
.item-meta-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  font-size: 10px;
  color: var(--muted);
}

.item-cat, .item-updated {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}

/* Pin star styling */
.item-pin {
  flex-shrink: 0;
  font-size: 18px;
  cursor: pointer;
  padding: 2px 4px;
  line-height: 1;
  transition: transform 0.1s ease;
  color: var(--gold);
}

.item-pin:hover {
  transform: scale(1.1);
}

/* Pinned card subtle indicator */
.item-card.pinned {
  border-left: 3px solid var(--gold);
  background: linear-gradient(90deg, var(--accent-light) 0%, var(--bg-surface) 8%);
}

/* Action buttons - more compact */


.btn-edit:hover, .btn-delete:hover {
  filter: brightness(0.95);
  transform: translateY(-1px);
}

/* Touch-friendly adjustments for mobile */
@media (max-width: 767px) {
  .item-card {
    padding: 10px 12px;
  }
  
  .item-name {
    font-size: 14px;
  }
  
  .item-price-row {
    font-size: 12px;
  }
  
  .item-meta-row {
    gap: 8px;
    font-size: 9px;
  }
  
  .item-pin {
    font-size: 16px;
  }
}
.item-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  border-top: 1px solid var(--border);   /* ← add this */
  padding-top: 8px;                      /* ← add this */
}
.act-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.btn-edit { background: var(--accent-light); color: var(--accent); }
.btn-delete { background: var(--danger-light); color: var(--danger); }

/* ----- MODALS ----- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(5px);
  z-index: 200;
  display: none;
  align-items: flex-end;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-surface);
  border-radius: 22px 22px 0 0;
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  padding: 20px 16px;
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 16px;
}
.price-warning {
  font-size: 11px;
  color: var(--danger);
  background: var(--danger-light);
  border-radius: 8px;
  padding: 6px;
  display: none;
  margin-top: 6px;
}
.price-warning.show { display: block; }
.autosave-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 600;
  background: var(--bg-elevated);
  border-radius: 20px;
  padding: 4px 10px;
}
.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
}
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: #fff;
  padding: 12px 24px;
  border-radius: 30px;
  font-weight: 700;
  opacity: 0;
  transition: 0.3s;
  z-index: 9999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ----- SIDEBAR ----- */
.sidebar {
  position: fixed;
  top: 58px;
  left: 0;
  bottom: 0;
  z-index: 201;
  width: 220px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.26s;
  display: flex;
  flex-direction: column;
  padding: 10px 8px;
}
.sidebar.open { transform: translateX(0); }
.sidebar.collapsed { width: 58px; }
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 12px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
}
.sidebar-item.active, .sidebar-item:hover {
  background: var(--accent-light);
  color: var(--accent);
}
.sidebar-collapse-btn {
  margin-top: auto;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  border-radius: 10px;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(2px);
}
.sidebar-overlay.open { display: block; }

/* ----- CHROME TABS BAR ----- */
.chrome-tabs-bar {
  display: none;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  padding: 6px 10px 0;
  gap: 2px;
  overflow-x: auto;
  align-items: flex-end;
}
.chrome-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 14px 9px;
  border-radius: 6px 6px 0 0;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-bottom: none;
  white-space: nowrap;
  flex-shrink: 0;
}
.chrome-tab.active {
  background: var(--bg-surface);
  color: var(--accent);
  border-color: var(--accent-glow);
}

/* ----- APP LAYOUT — DESKTOP SCROLL FIX ----- */
.app-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 58px);
}
.main-content {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.panels-container {
  flex: 1;
  overflow: hidden;
  display: flex;
  min-width: 0;
  height: 100%;
}
/* SCROLL FIX: panel-pane is the scroll container on desktop */
.panel-pane {
  display: none;
  flex: 1;
  width: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  height: 100%;
}
.panel-pane.active { display: block; }
.panel-pane > .panel {
  width: 100%;
  max-width: 100%;
  padding: 20px 24px;
  margin: 0;
  box-sizing: border-box;
}

/* ----- STATS BAR ----- */
.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  font-size: 18px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-card span {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ===== IMPROVED SEARCH BAR ===== */
.search-wrap {
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.search-field-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-icon {
  position: absolute;
  left: 14px;
  width: 18px;
  height: 18px;
  color: var(--muted);
  pointer-events: none;
  flex-shrink: 0;
}
.search-field-wrap input {
  padding: 13px 42px 13px 44px !important;
  height: 48px;
  border-radius: 14px;
  font-size: 15px;
  border: 1.5px solid var(--border);
  background: var(--bg-surface);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transition: all 0.2s;
}
.search-field-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 2px 12px rgba(0,0,0,0.06);
}
.search-clear {
  position: absolute;
  right: 12px;
  background: var(--bg-elevated);
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  line-height: 1;
  opacity: 0;
  pointer-events: none;
}
.search-clear.visible { opacity: 1; pointer-events: auto; }
.search-clear:hover { background: var(--danger-light); color: var(--danger); }

/* ===== IMPROVED SORT PILLS ===== */
.sort-pills {
  display: flex;
  align-items: center;
  gap: 6px;
}
.sort-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 2px;
  flex-shrink: 0;
}
.sort-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.sort-pill:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}
.sort-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px var(--accent-glow);
}

/* ===== IMPROVED SETTINGS ===== */
.settings-sync-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  background: var(--accent-light);
  border: 1.5px solid var(--accent-glow);
  border-radius: 18px;
  padding: 18px 20px;
  margin-bottom: 16px;
}
.sync-card-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.sync-icon {
  width: 42px;
  height: 42px;
  background: var(--accent);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.sync-icon svg { width: 20px; height: 20px; stroke: #fff; fill: none; }
.sync-title { font-size: 14px; font-weight: 700; color: var(--text); }
.sync-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.sync-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 10px 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  box-shadow: 0 3px 10px var(--accent-glow);
}
.sync-btn svg { width: 15px; height: 15px; stroke: #fff; fill: none; }
.sync-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.settings-section {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.settings-section-title {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}
.settings-section-title svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; flex-shrink: 0; }
.settings-actions-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.settings-action-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
  padding: 14px 16px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.18s;
  text-align: left;
}
.settings-action-btn:hover {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--accent-glow);
}
.settings-action-btn.danger:hover {
  border-color: var(--danger);
  background: var(--danger-light);
  box-shadow: 0 4px 12px rgba(220,38,38,0.12);
}
.sab-icon { font-size: 22px; line-height: 1; margin-bottom: 2px; }
.sab-label { font-size: 13px; font-weight: 700; color: var(--text); }
.sab-desc { font-size: 11px; color: var(--muted); }
.theme-options {
  display: flex;
  gap: 12px;
}
.theme-opt {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 14px 10px;
  background: var(--bg-elevated);
  border: 2px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.18s;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
}
.theme-opt:hover { border-color: var(--accent); transform: translateY(-2px); }
.theme-swatch {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2.5px solid rgba(0,0,0,0.08);
}
.slate-swatch  { background: linear-gradient(135deg, #f1f5f9 50%, #1e40af 50%); }
.aurora-swatch { background: linear-gradient(135deg, #eef2ff 50%, #0f2b3d 50%); }
.ember-swatch  { background: linear-gradient(135deg, #2c1a1a 50%, #ff8c42 50%); }

/* ----- EMPTY STATE ----- */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 15px;
}

/* ----- MOBILE OVERRIDES (single block, no duplicate) ----- */
@media (max-width: 767px) {
  .chrome-tabs-bar { display: none !important; }
  .tabs {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 150;
    background: var(--bg-surface);
    border-top: 2px solid var(--border);
    border-bottom: none;

    justify-content: space-around;
    padding: 8px;
  }
  .sidebar {
    position: fixed;
    top: 58px;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  /* On mobile, override flex layout so page scrolls naturally */
  .app-layout { height: auto; display: block; overflow: visible; }
  .main-content { overflow: visible; height: auto; }
  .panels-container { display: block; overflow: visible; height: auto; }
  .panel-pane { display: block; overflow: visible; height: auto; }
  .panel-pane > .panel { display: none; }
  .panel-pane > .panel.active { display: block; padding: 18px 16px 80px; }
  /* Settings responsive */
  .settings-sync-card { flex-direction: column; align-items: flex-start; }
  .sync-btn { width: 100%; justify-content: center; }
  .settings-actions-grid { grid-template-columns: 1fr 1fr; }
}
</style>

<script>
let items = [];
let editingId = null;
let activeFilter = 'All';
let activeSort = 'recent';
let quoteSelections = {};
const GS_HARDCODED_URL = 'https://script.google.com/macros/s/AKfycbwVop8Nv2yon-J2UjWga98U_AZgTIZwTK-jJzf4-izFlDuwYuYLxEr42nGpy2wNhIKDSw/exec';

let _gsPushPending = false;
let _lastEditTime = 0;
let _searchQuery = '';
let _searchTimeout = null;



function clearNameField() {
  const nameInput = document.getElementById('addName');
  if (nameInput) {
    nameInput.value = '';
    nameInput.focus();
  }
  
  // Hide clear button
  const clearBtn = document.getElementById('addNameClear');
  if (clearBtn) clearBtn.classList.remove('visible');
}
// ====================== STORAGE ======================
function saveSnapshot(data) { 
  try { 
    localStorage.setItem('erSnapshot', JSON.stringify(data)); 
    localStorage.setItem('erSnapshotTime', Date.now().toString()); 
  } catch(e){}
}
function loadSnapshot() { 
  try { 
    const raw = localStorage.getItem('erSnapshot'); 
    return raw ? JSON.parse(raw) : []; 
  } catch(e){ return []; } 
}

function saveToDB() {
  _lastEditTime = Date.now();
  localStorage.setItem('electricRates', JSON.stringify(items));
  saveSnapshot(items);
  
  if (!_gsPushPending) { 
    _gsPushPending = true; 
    setTimeout(() => { 
      gsPushToSheet(true); 
      setTimeout(() => { _gsPushPending = false; }, 1800); 
    }, 400); 
  }
}

function roundPrice(n) { return Math.round((n||0)*100)/100; }

// ====================== RENDER ======================
function renderAll() { 
  renderStats(); 
  renderFilterChips(); 
  renderItems(); 
  document.getElementById('itemCount').innerText = items.length + ' Items'; 
}

function renderStats() {
  const total=items.length, avgBuy=total?items.reduce((s,i)=>s+(i.buyPrice||0),0)/total:0;
  document.getElementById('statsBar').innerHTML =
    `<div class="stat-card">${total}<span>Items</span></div>` +
    `<div class="stat-card">${new Set(items.map(i=>i.cat||'Misc')).size}<span>Categories</span></div>` +
    `<div class="stat-card">₹${avgBuy.toFixed(0)}<span>Avg Buy</span></div>`;
}

function renderFilterChips() {
  const cats=['All',...new Set(items.map(i=>i.cat||'Misc'))];
  document.getElementById('filterChips').innerHTML = cats.map(c=>
    `<button class="filter-chip ${c===activeFilter?'active':''}" data-cat="${c}">${c}</button>`
  ).join('');
}

function escapeHtml(s){ return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

function renderItems() {
  let list = items.filter(i => i.name);

  if(activeFilter !== 'All') {
    list = list.filter(i => (i.cat || 'Misc') === activeFilter);
  }

  const q = _searchQuery;
  if(q) {
    list = list.filter(i => {
      const searchText = [i.name, i.brand, i.cat, i.distributor, i.location, i.note, i.updated]
        .join(' ').toLowerCase();
      return searchText.includes(q);
    });
  }

  if(activeSort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  else if(activeSort === 'buy-asc') list.sort((a,b) => (a.buyPrice||0) - (b.buyPrice||0));
  else list.sort((a,b) => String(b.id||'').localeCompare(String(a.id||'')));

  // Pinned items always on top
  list.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

  const container = document.getElementById('itemsList');
  if(!list.length){ 
    container.innerHTML = '<div class="empty">📭 No items found</div>'; 
    return; 
  }

  container.innerHTML = list.map(i => `
    <div class="item-card ${i.pinned ? 'pinned' : ''}">
      <div class="item-card-header">
        <div class="item-checkbox-wrapper">
          <input type="checkbox" class="item-checkbox" 
                 data-id="${i.id}" 
                 onchange="toggleItemSelection('${i.id}', this.checked); event.stopImmediatePropagation();">
        </div>
        
        <div class="item-card-content">
          <div class="item-title-row">
            <span class="item-name">${escapeHtml(i.name)}</span>
            ${i.brand ? `<span class="item-brand">${escapeHtml(i.brand)}</span>` : ''}
          </div>
          
          <div class="item-price-row">
            <span class="price-buy">₹${(i.buyPrice||0).toLocaleString()}</span>
            <span class="price-sep">→</span>
            <span class="price-sell">₹${(i.sellPrice||0).toLocaleString()}</span>
          </div>
          
          <div class="item-meta-row">
            ${i.cat ? `<span class="item-cat">📁 ${escapeHtml(i.cat)}</span>` : ''}
            ${i.updated ? `<span class="item-updated">🕒 ${i.updated}</span>` : ''}
          </div>
        </div>

        <div class="item-pin" onclick="event.stopPropagation(); togglePin('${i.id}');">
          ${i.pinned ? '⭐' : '☆'}
        </div>

        <div class="item-view" onclick="event.stopPropagation(); openDetail('${i.id}');">
          👁️
        </div>
      </div>

      <div class="item-actions" onclick="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <button class="act-btn btn-edit" onclick="event.stopPropagation();openEdit('${i.id}')">✏️ Edit</button>
        <button class="act-btn btn-delete" onclick="event.stopPropagation();deleteItem('${i.id}')">🗑️ Delete</button>
      </div>
    </div>
  `).join('');
}
// ====================== CRUD ======================
function saveItem() {
  let name = document.getElementById('addName').value.trim();
  let buy = roundPrice(parseFloat(document.getElementById('addBuyPrice').value));
  if(!name || isNaN(buy)){ 
    showToast('Name & buy price required','#c0392b'); 
    return; 
  }

  let newItem = {
    id: Date.now().toString(), 
    name,
    brand: document.getElementById('addBrand').value.trim(),
    buyPrice: buy,
    sellPrice: roundPrice(parseFloat(document.getElementById('addSellPrice').value)||0),
    unit: document.getElementById('addUnit').value.trim(),
    cat: document.getElementById('addCat').value.trim(),
    distributor: document.getElementById('addDistributor').value.trim(),
    location: document.getElementById('addLocation').value.trim(),
    note: document.getElementById('addNote').value.trim(),
updated: new Date().toLocaleDateString('en-IN', { 
  day: '2-digit', 
  month: 'short', 
  year: 'numeric' 
}),    priceHistory: [],
    pinned: false          // ← Important
  };

  newItem.priceHistory = [{date: new Date().toLocaleString(), buyPrice: buy, sellPrice: newItem.sellPrice, type:'new'}];
  items.unshift(newItem);
  saveToDB(); 
  renderAll();
  clearAddForm();
  showToast(`✅ "${name}" added`);
}

function clearAddForm() {
  const fields = ['addName','addBrand','addBuyPrice','addSellPrice','addUnit','addCat','addDistributor','addLocation','addNote'];
  fields.forEach(id => {
    const el = document.getElementById(id);

function openEdit(id){
  editingId=id;
  let i=items.find(i=>i.id===id);
  if(!i) return;
  document.getElementById('editName').value=i.name;
  document.getElementById('editBrand').value=i.brand||'';
  document.getElementById('editBuyPrice').value=i.buyPrice;
  document.getElementById('editSellPrice').value=i.sellPrice||0;
  document.getElementById('editUnit').value=i.unit||'';
  document.getElementById('editCat').value=i.cat||'';
  document.getElementById('editDistributor').value=i.distributor||'';
  document.getElementById('editLocation').value=i.location||'';
  document.getElementById('editNote').value=i.note||'';
  document.getElementById('editReason').value='';
  checkSellWarn('edit');
  document.getElementById('editModal').classList.add('active');
}

function updateItem() {
  let idx=items.findIndex(i=>i.id===editingId);
  if(idx===-1) return;
  let old=items[idx];
  let newName=document.getElementById('editName').value.trim();
  let newBuy=roundPrice(parseFloat(document.getElementById('editBuyPrice').value));
  let newSell=roundPrice(parseFloat(document.getElementById('editSellPrice').value)||0);
  if(!newName||isNaN(newBuy)){ showToast('Name and buy price required','#c0392b'); return; }

  let history=Array.isArray(old.priceHistory)?[...old.priceHistory]:[];
  let reason=document.getElementById('editReason').value.trim();
  if(newBuy!==old.buyPrice||newSell!==(old.sellPrice||0)){
    history.unshift({
      date:new Date().toLocaleString(),
      buyPrice:newBuy,
      sellPrice:newSell,
      prevBuyPrice:old.buyPrice,
      prevSellPrice:old.sellPrice,
      type:newBuy>old.buyPrice?'up':'down',
      reason:reason||'Manual edit'
    });
  }
  items[idx]={...old, name:newName, brand:document.getElementById('editBrand').value.trim(),
    buyPrice:newBuy, sellPrice:newSell,
    unit:document.getElementById('editUnit').value.trim(),
    cat:document.getElementById('editCat').value.trim(),
    distributor:document.getElementById('editDistributor').value.trim(),
    location:document.getElementById('editLocation').value.trim(),
    note:document.getElementById('editNote').value.trim(),
    updated:new Date().toLocaleDateString('en-IN'),
    priceHistory:history
  };
  saveToDB(); renderAll(); closeEdit(); showToast('Item updated ✓');
}

function deleteItem(id){
  if(!confirm('Delete permanently?')) return;
  items=items.filter(i=>i.id!==id);
  saveToDB(); renderAll(); showToast('🗑️ Deleted');
}

function setupAutocomplete() {

  const fields = {

    addUnit: 'unit',

    dl.id = fieldId + 'List';
    document.body.appendChild(dl);
    input.setAttribute('list', dl.id);

    input.addEventListener('focus', () => updateDatalist(dl, fields[fieldId]));
  });

  // Smart Autocomplete for Item Name (with auto-fill)
  setupNameAutocomplete();
}

function setupNameAutocomplete() {
  const nameInput = document.getElementById('addName');
  if (!nameInput) return;

  // Create custom dropdown (replaces native datalist to avoid interference)
  const dropdown = document.createElement('div');
  dropdown.id = 'nameDropdown';
  dropdown.style.cssText = `
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--bg-surface); border: 1.5px solid var(--accent);
    border-radius: 10px; z-index: 999; max-height: 200px;
    overflow-y: auto; display: none; box-shadow: var(--shadow-md);
  `;
  nameInput.parentElement.style.position = 'relative';
  nameInput.parentElement.appendChild(dropdown);

  // Show suggestions only when user types (no auto-fill on input)
  nameInput.addEventListener('input', () => {
    const val = nameInput.value.trim().toLowerCase();
    if (!val) {
      dropdown.style.display = 'none';
      return;
    }
    const matches = items
      .filter(i => i.name && i.name.toLowerCase().includes(val))
      .slice(0, 8);
    if (!matches.length) {
      dropdown.style.display = 'none';
      return;
    }
    dropdown.innerHTML = matches.map(i => `
      <div style="padding:12px 14px; cursor:pointer; font-size:14px;
                  border-bottom:1px solid var(--border);"
           onmousedown="event.preventDefault(); fillFromItem('${i.id}')">
        ${escapeHtml(i.name)}
        <span style="font-size:11px; color:var(--muted); margin-left:6px;">
          ₹${i.buyPrice} · ${i.cat || ''}
        </span>
      </div>
    `).join('');
    dropdown.style.display = 'block';
  });

  nameInput.addEventListener('blur', () => {
    setTimeout(() => dropdown.style.display = 'none', 150);
  });
}

function gsGetUrl() { return GS_HARDCODED_URL; }

async function gsStartupFetch() {
  try {
    const resp = await fetch(gsGetUrl() + '?action=read', {method:'GET'});
    const text = await resp.text();
    const clean = text.trim().replace(/^[^\[{]*/, '').replace(/[^\]}]*$/, '');
    const data = JSON.parse(clean);
    if(Array.isArray(data) && data.length>0){
      items = data.map(row => ({ ...row, id:String(row.id), buyPrice:parseFloat(row.buyPrice)||0, sellPrice:parseFloat(row.sellPrice)||0, priceHistory:Array.isArray(row.priceHistory)?row.priceHistory:[] }));
      saveToDB(); renderAll();
      showToast(`📡 Loaded ${items.length} items from Sheet`);
    }
  } catch(e) {
    console.warn('GS fetch failed', e);
    const snap=loadSnapshot(); if(snap.length){ items=snap; renderAll(); }
  }
}

function gsReconcile() {
  const btn = document.getElementById('syncBtn'); if(btn) btn.style.opacity='0.6';
  fetch(gsGetUrl()+'?action=read').then(r=>r.text()).then(t=>{
    const clean=t.trim().replace(/^[^\[{]*/,'').replace(/[^\]}]*$/,'');
    const data=JSON.parse(clean);
    if(Array.isArray(data)){
      items=data.map(r=>({...r,id:String(r.id),buyPrice:parseFloat(r.buyPrice)||0,sellPrice:parseFloat(r.sellPrice)||0, priceHistory:Array.isArray(r.priceHistory)?r.priceHistory:[]}));
      saveToDB(); renderAll(); showToast(`🔄 Synced ${items.length} items`);
    }
  }).catch(()=>showToast('Sync failed','#c0392b')).finally(()=>{ if(btn) btn.style.opacity='1'; });
}

function gsPushToSheet(silent){
  fetch(gsGetUrl(), { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action:'write', items:items}) })
    .then(()=>{ if(!silent) showToast('⬆️ Pushed to Sheet'); }).catch(()=>{});
}

async function gsQuietPull(){
  if(Date.now() - _lastEditTime < 30000) return;
  try {
    const resp = await fetch(gsGetUrl() + '?action=read');
    const text = await resp.text();
    const clean = text.trim().replace(/^[^\[{]*/, '').replace(/[^\]}]*$/, '');
    const data = JSON.parse(clean);
    if(!Array.isArray(data)) return;
    const remoteSig = JSON.stringify(data.map(i => `${i.id}:${i.buyPrice}:${i.sellPrice}`));
    const localSig = JSON.stringify(items.map(i => `${i.id}:${i.buyPrice}:${i.sellPrice}`));
    if(remoteSig !== localSig){
      items = data.map(r => ({...r,id:String(r.id),buyPrice:parseFloat(r.buyPrice)||0,sellPrice:parseFloat(r.sellPrice)||0,priceHistory:Array.isArray(r.priceHistory)?r.priceHistory:[]}));
      saveToDB(); renderAll(); showToast('🔄 Auto-updated from Sheet','#1e88e5');
    }
  } catch(e){}
}

function gsStartAutoPull(){ setInterval(gsQuietPull, 7000); }

function openDetail(id){
  var i = items.find(x => x.id === id);
  if(!i) return;

  var historyHtml = '';
  if(Array.isArray(i.priceHistory) && i.priceHistory.length > 0){
    historyHtml += '<div style="margin-top:16px;margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);">Price History</div>';
    historyHtml += '<div style="display:flex;flex-direction:column;gap:6px;">';
    for(var h=0; h<i.priceHistory.length; h++){
      var entry = i.priceHistory[h];
      var arrow = entry.type==='up' ? '▲' : entry.type==='down' ? '▼' : '●';
      var arrowColor = entry.type==='up' ? 'var(--danger)' : entry.type==='down' ? 'var(--success)' : 'var(--muted)';
      var isInitial = (h === i.priceHistory.length - 1);
      historyHtml += '<div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:10px 12px;">';
      historyHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
      historyHtml += '<span style="font-family:JetBrains Mono,monospace;font-size:13px;font-weight:700;">';
      historyHtml += '<span style="color:'+arrowColor+';">'+arrow+'</span> Buy: ₹'+(entry.buyPrice||0)+' | Sell: ₹'+(entry.sellPrice||0);
      historyHtml += '</span>';
      if(isInitial) historyHtml += '<span style="font-size:10px;background:var(--accent-light);color:var(--accent);padding:2px 7px;border-radius:10px;font-weight:700;">Initial</span>';
      historyHtml += '</div>';
      if(entry.prevBuyPrice != null){
        historyHtml += '<div style="font-size:11px;color:var(--muted);">Was: ₹'+entry.prevBuyPrice+' buy | ₹'+(entry.prevSellPrice||0)+' sell</div>';
      }
      if(entry.reason){
        historyHtml += '<div style="font-size:11px;color:var(--text2);margin-top:2px;">Note: '+escapeHtml(entry.reason)+'</div>';
      }
      historyHtml += '<div style="font-size:10px;color:var(--muted);margin-top:3px;">'+entry.date+'</div>';
      historyHtml += '</div>';
    }
    historyHtml += '</div>';
  } else {
    historyHtml = '<div style="margin-top:12px;font-size:12px;color:var(--muted);">No price history yet.</div>';
  }

  var html = `<div class="modal-title">${escapeHtml(i.name)}</div>`;
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">';
  html += '<div style="background:var(--accent-light);border-radius:10px;padding:10px 12px;">';
  html += '<div style="font-size:10px;font-weight:700;color:var(--muted);">Buy Price</div>';
  html += `<div style="font-size:18px;font-weight:700;color:var(--accent);">₹${(i.buyPrice||0).toLocaleString()}</div>`;
  html += '</div>';
  html += '<div style="background:var(--success-light);border-radius:10px;padding:10px 12px;">';
  html += '<div style="font-size:10px;font-weight:700;color:var(--muted);">Sell Price</div>';
  html += `<div style="font-size:18px;font-weight:700;color:var(--success);">₹${(i.sellPrice||0).toLocaleString()}</div>`;
  html += '</div></div>';

  if(i.updated) html += `<p style="font-size:12px;color:var(--muted);margin:6px 0 12px;"><strong>Last Updated:</strong> ${i.updated}</p>`;

  if(i.brand) html += `<p style="color:var(--muted);margin-bottom:4px;font-size:13px;">Brand: ${escapeHtml(i.brand)}</p>`;
  if(i.cat)   html += `<p style="color:var(--muted);margin-bottom:4px;font-size:13px;">Category: ${escapeHtml(i.cat)}</p>`;
  if(i.unit)  html += `<p style="color:var(--muted);margin-bottom:4px;font-size:13px;">Unit: ${escapeHtml(i.unit)}</p>`;
  if(i.distributor) html += `<p style="color:var(--muted);margin-bottom:4px;font-size:13px;">Distributor: ${escapeHtml(i.distributor)}</p>`;
  if(i.location)    html += `<p style="color:var(--muted);margin-bottom:4px;font-size:13px;">Location: ${escapeHtml(i.location)}</p>`;
  if(i.note)  html += `<p style="color:var(--text2);margin-bottom:4px;font-size:13px;margin-top:4px;">${escapeHtml(i.note)}</p>`;

  html += historyHtml;
  html += '<button class="save-btn" style="margin-top:16px;" onclick="closeDetail()">Close</button>';

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('active');
}

function updateBulkUI() {
  const scope = document.getElementById('bulkScope').value;
  const extra = document.getElementById('bulkScopeExtra');
  let html = '';

  if (scope === 'category') {
    const cats = [...new Set(items.map(i => i.cat).filter(Boolean))].sort();
    html = `<label>Category</label><select id="bulkCatValue" style="width:100%;margin-top:8px;padding:10px;">`;
    cats.forEach(c => html += `<option value="${c}">${c}</option>`);
    html += `</select>`;
  } 
  else if (scope === 'distributor') {
    const dists = [...new Set(items.map(i => i.distributor).filter(Boolean))].sort();
    html = `<label>Supplier/Distributor</label><select id="bulkDistValue" style="width:100%;margin-top:8px;padding:10px;">`;
    dists.forEach(d => html += `<option value="${d}">${d}</option>`);
    html += `</select>`;
  }

  extra.innerHTML = html;
  updateBulkPreview();
}

function updateBulkPreview() {
  let count = 0;
  const scope = document.getElementById('bulkScope').value;

  if (scope === 'selected') count = selectedItems.length;
  else if (scope === 'search') {
    const q = _searchQuery.toLowerCase();
    count = items.filter(i => [i.name, i.brand, i.cat, i.distributor].join(' ').toLowerCase().includes(q)).length;
  }
  else if (scope === 'all') count = items.length;
  else if (scope === 'category') {
    const cat = document.getElementById('bulkCatValue')?.value;
    if (cat) count = items.filter(i => i.cat === cat).length;
  }
  else if (scope === 'distributor') {
    const dist = document.getElementById('bulkDistValue')?.value;
    if (dist) count = items.filter(i => i.distributor === dist).length;
  }

  document.getElementById('bulkCount').innerText = count;
  document.getElementById('bulkPreview').innerHTML = `
    <strong>Will update <span style="color:var(--accent)">${count}</span> items</strong><br>
    <small>Make sure you have selected the correct scope</small>
  `;
}

function applyBulkUpdate() {
  const scope = document.getElementById('bulkScope').value;
  const operation = document.getElementById('bulkOperation').value;
  const value = parseFloat(document.getElementById('bulkValue').value);
  
  if (!value && operation !== 'set') {
    showToast('Please enter a valid number', '#c0392b');
    return;
  }

  let targets = [];

  if (scope === 'selected') {
    targets = items.filter(i => selectedItems.includes(i.id));
  } 
  else if (scope === 'search') {
    const q = _searchQuery.toLowerCase();
    targets = items.filter(i => 
      [i.name, i.brand, i.cat, i.distributor, i.note].join(' ').toLowerCase().includes(q)
    );
  } 
  else if (scope === 'category') {
    const cat = document.getElementById('bulkCatValue')?.value;
    targets = items.filter(i => i.cat === cat);
  } 
  else if (scope === 'distributor') {
    const dist = document.getElementById('bulkDistValue')?.value;
    targets = items.filter(i => i.distributor === dist);
  } 
  else if (scope === 'all') {
    targets = [...items];
  }

  if (targets.length === 0) {
    showToast('No items matched', '#c0392b');
    return;
  }

  const updateBuy = document.getElementById('updateBuy').checked;
  const updateSell = document.getElementById('updateSell').checked;

  let count = 0;

  targets.forEach(item => {
    if (updateBuy) {
      item.buyPrice = calculateNewPrice(item.buyPrice, operation, value);
    }
    if (updateSell) {
      item.sellPrice = calculateNewPrice(item.sellPrice || item.buyPrice, operation, value);
    }
    item.updated = new Date().toLocaleDateString('en-IN');
    count++;
  });

  saveToDB();
  renderAll();
  closeBulkModal();
  selectedItems = []; // clear selection
  showToast(`✅ Successfully updated ${count} items`, '#10b981');
}

function calculateNewPrice(current, operation, value) {
  if (!current) current = 0;
  switch(operation) {
    case 'set': return roundPrice(value);
    case 'increase': return roundPrice(current + value);
    case 'decrease': return roundPrice(current - value);
    case 'percent_up': return roundPrice(current * (1 + value/100));
    case 'percent_down': return roundPrice(current * (1 - value/100));
    default: return current;
  }
}

function closeBulkModal() {
  document.getElementById('bulkModal').classList.remove('active');
}
</script>
</body>
</html>
