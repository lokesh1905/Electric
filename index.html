<!DOCTYPE html>
<html lang="en" data-theme="aurora">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3b63d9">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Electric Shop — Rate Book (Pro)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ----- BASE THEMES (unchanged from original) ----- */
:root {
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 20px rgba(0,0,0,0.08);
  --transition: all 0.2s ease;
}
[data-theme="slate"] {
  --bg-base: #f1f5f9;
  --bg-surface: #ffffff;
  --bg-elevated: #f8fafc;
  --border: #e2e8f0;
  --accent: #1e40af;
  --accent-light: #eff6ff;
  --accent-glow: rgba(30,64,175,0.15);
  --text: #0f172a;
  --text2: #334155;
  --muted: #64748b;
  --success: #0f7b3a;
  --success-light: #eaf8ef;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --sell: #0f7b3a;
  --sell-light: #eaf8ef;
  --sell-glow: rgba(15,123,58,0.2);
  --gold: #d97706;
}
[data-theme="aurora"] {
  --bg-base: #eef2ff;
  --bg-surface: #ffffff;
  --bg-elevated: #fafcff;
  --border: #d9e2f5;
  --accent: #0f2b3d;
  --accent-light: #eef7ff;
  --accent-glow: rgba(15,43,61,0.12);
  --text: #0a2540;
  --text2: #2c3e50;
  --muted: #5e7c97;
  --success: #1f8a4c;
  --success-light: #e3f9ee;
  --danger: #e25c5c;
  --danger-light: #fff1f0;
  --sell: #1f8a4c;
  --sell-light: #e3f9ee;
  --sell-glow: rgba(31,138,76,0.2);
  --gold: #e2a13f;
}
[data-theme="ember"] {
  --bg-base: #2c1a1a;
  --bg-surface: #3e2a2a;
  --bg-elevated: #4f3838;
  --border: #684e4e;
  --accent: #ff8c42;
  --accent-light: #4a3028;
  --accent-glow: rgba(255,140,66,0.25);
  --text: #ffefd9;
  --text2: #fad4b3;
  --muted: #c7a58a;
  --success: #66cc8a;
  --success-light: #283b2a;
  --danger: #ff7b72;
  --danger-light: #542a25;
  --sell: #66cc8a;
  --sell-light: #283b2a;
  --sell-glow: rgba(102,204,138,0.25);
  --gold: #ffb347;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-base);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.25s, color 0.25s;
}
/* ========== FIX 1: DESKTOP FULL WIDTH STRETCH ========== */
.panel-pane > .panel {
  width: 100%;
  max-width: 100%;
  padding: 20px 24px;
  margin: 0;
  box-sizing: border-box;
}
.card, .settings-accordion, .settings-acc-body {
  width: 100%;
}
/* ----- REST OF ORIGINAL STYLES (unchanged) ----- */
header {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 0 18px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 18px;
}
.logo-icon {
  width: 34px;
  height: 34px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-icon svg { width: 18px; height: 18px; fill: #fff; }
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.item-count {
  background: var(--accent-light);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--accent-glow);
  font-family: 'JetBrains Mono', monospace;
}
.icon-btn {
  width: 34px;
  height: 34px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.icon-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.tabs {
  display: flex;
  background: var(--bg-surface);
  border-bottom: 2px solid var(--border);
  padding: 6px 8px 0;
  gap: 4px;
}
.tab {
  flex: 1;
  padding: 10px 4px 10px;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  border-radius: 6px 6px 0 0;
  transition: all 0.2s;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: transparent;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--accent-light);
}
.panel { display: none; }
.panel.active { display: block; }
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}
label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.6px;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 7px;
}
input, textarea, select {
  width: 100%;
  background: var(--bg-base);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  outline: none;
  transition: all 0.2s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  background: var(--bg-surface);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.form-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.price-wrap { position: relative; }
.price-prefix {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  pointer-events: none;
}
.price-wrap input { padding-left: 28px; }
.save-btn {
  width: 100%;
  padding: 17px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-lg);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px var(--accent-glow);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.save-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
.filter-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-bottom: 14px;
}
.filter-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
}
.filter-chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.item-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.item-card:hover { border-color: var(--accent-glow); transform: translateY(-1px); }
.item-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.act-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.btn-edit { background: var(--accent-light); color: var(--accent); }
.btn-delete { background: var(--danger-light); color: var(--danger); }
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(5px);
  z-index: 200;
  display: none;
  align-items: flex-end;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-surface);
  border-radius: 22px 22px 0 0;
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  padding: 20px 16px;
}
.price-warning {
  font-size: 11px;
  color: var(--danger);
  background: var(--danger-light);
  border-radius: 8px;
  padding: 6px;
  display: none;
  margin-top: 6px;
}
.price-warning.show { display: block; }
.autosave-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 600;
  background: var(--bg-elevated);
  border-radius: 20px;
  padding: 4px 10px;
}
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: #fff;
  padding: 12px 24px;
  border-radius: 30px;
  font-weight: 700;
  opacity: 0;
  transition: 0.3s;
  z-index: 9999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.sidebar {
  position: fixed;
  top: 58px;
  left: 0;
  bottom: 0;
  z-index: 201;
  width: 220px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.26s;
  display: flex;
  flex-direction: column;
  padding: 10px 8px;
}
.sidebar.open { transform: translateX(0); }
.sidebar.collapsed { width: 58px; }
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 12px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
}
.sidebar-item.active, .sidebar-item:hover {
  background: var(--accent-light);
  color: var(--accent);
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(2px);
}
.sidebar-overlay.open { display: block; }
.chrome-tabs-bar {
  display: none;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  padding: 6px 10px 0;
  gap: 2px;
  overflow-x: auto;
  align-items: flex-end;
}
.chrome-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 14px 9px;
  border-radius: 6px 6px 0 0;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-bottom: none;
  white-space: nowrap;
  flex-shrink: 0;
}
.chrome-tab.active {
  background: var(--bg-surface);
  color: var(--accent);
  border-color: var(--accent-glow);
}
.app-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 58px);
}
.main-content {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.panels-container {
  flex: 1;
  overflow: hidden;
  display: flex;
  min-width: 0;
  height: 100%;
}
.panel-pane {
  display: none;
  flex: 1;
  overflow-y: auto;
  width: 100%;
}
.panel-pane.active { display: block; }
@media (max-width: 767px) {
  .chrome-tabs-bar { display: none !important; }
  .tabs {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 150;
    background: var(--bg-surface);
    border-top: 2px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 8px;
  }
  .sidebar {
    position: fixed;
    top: 58px;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .app-layout { height: auto; display: block; }
  .main-content { overflow: visible; height: auto; }
  .panels-container { display: block; overflow: visible; }
  .panel-pane { display: block; overflow: visible; }
  .panel-pane > .panel { display: none; }
  .panel-pane > .panel.active { display: block; padding: 18px 16px; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div><div>Rate Book<span class="logo-sub">Electric Shop</span></div></div>
  <div class="header-right">
    <button class="icon-btn" onclick="toggleSidebar()">☰</button>
    <div class="autosave-indicator" id="autoSaveIndicator"><div class="dot"></div><span>Auto</span></div>
    <div class="item-count" id="itemCount">0 Items</div>
    <button class="icon-btn" id="syncBtn" onclick="gsReconcile()">⟳</button>
    <button class="icon-btn" onclick="openQR()">◧</button>
  </div>
</header>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-layout">
<nav class="sidebar" id="sidebarNav">
  <div class="sidebar-item active" onclick="openPane('browse')">🔍 Find Items</div>
  <div class="sidebar-item" onclick="openPane('add')">+ Add Item</div>
  <div class="sidebar-item" onclick="openPane('quote')">📄 Quotation</div>
  <div class="sidebar-item" onclick="openPane('settings')">⚙️ Settings</div>
  <div class="sidebar-collapse-btn" onclick="toggleSidebarCollapse()">◀ Collapse</div>
</nav>
<div class="main-content">
<div class="chrome-tabs-bar" id="chromeTabsBar"></div>
<div class="tabs" id="mobileTabsBar">
  <div class="tab active" onclick="switchTab('browse')">📦 Find</div>
  <div class="tab" onclick="switchTab('add')">➕ Add</div>
  <div class="tab" onclick="switchTab('quote')">📑 Quote</div>
  <div class="tab" onclick="switchTab('settings')">⚙️</div>
</div>
<div class="panels-container" id="panelsContainer">

<!-- BROWSE PANEL -->
<div class="panel active" id="tab-browse">
  <div class="stats-bar" id="statsBar" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;"></div>
  <div class="search-wrap" style="margin-bottom:12px;"><input type="text" id="searchInput" placeholder="Search items, brands..." oninput="renderItems()"></div>
  <div class="filter-row" id="filterChips"></div>
  <div class="sort-row"><span>Sort:</span> <button onclick="setSort('name')">A-Z</button><button onclick="setSort('buy-asc')">Buy ↑</button><button onclick="setSort('recent')" class="active">Recent</button></div>
  <div id="itemsList"></div>
</div>

<!-- ADD PANEL -->
<div class="panel" id="tab-add">
  <div class="card">
    <div class="section-label">New Item</div>
    <input type="text" id="addName" placeholder="Item name *">
    <input type="text" id="addBrand" placeholder="Brand">
    <div class="form-2col">
      <div><label>Buy Price (₹)</label><input type="number" id="addBuyPrice" step="0.01"></div>
      <div><label>Sell Price (₹)</label><input type="number" id="addSellPrice" step="0.01"></div>
    </div>
    <div class="price-warning" id="addSellWarn">⚠️ Sell price lower than buy</div>
    <input type="text" id="addUnit" placeholder="Unit (pc, mtr, box)">
    <input type="text" id="addCat" placeholder="Category">
    <input type="text" id="addDistributor" placeholder="Distributor">
    <input type="text" id="addLocation" placeholder="Shop/Location">
    <textarea id="addNote" placeholder="Notes / specs"></textarea>
  </div>
  <button class="save-btn" onclick="saveItem()">💾 Save Item</button>
</div>

<!-- QUOTE PANEL (simplified but functional) -->
<div class="panel" id="tab-quote">
  <div class="card"><input type="text" id="quoteSearch" placeholder="Search items..." oninput="renderQuoteItems()"><div id="quoteItemsList"></div></div>
  <div class="card"><div id="quoteSummary"></div><button class="save-btn" onclick="shareQuote()">📤 Share Quote</button></div>
</div>

<!-- SETTINGS PANEL -->
<div class="panel" id="tab-settings">
  <div style="background:var(--accent-light);border-radius:18px;padding:16px;margin-bottom:12px;"><strong>📡 Google Sheets Sync</strong><div id="gsheetsStatusSub">Always connected — auto sync</div><button onclick="gsReconcile()" class="save-btn" style="margin-top:8px;">⟳ Sync Now</button></div>
  <div class="settings-accordion open"><div class="settings-acc-header" onclick="toggleAcc(this)">📁 Data & Backup</div><div class="settings-acc-body"><button onclick="exportData()">📥 Export JSON</button><button onclick="exportExcel()">📊 Export Excel</button><button onclick="document.getElementById('importFile').click()">📂 Import JSON</button><button onclick="clearAll()" style="background:var(--danger-light);color:var(--danger)">🗑️ Clear All Items</button></div></div>
  <div class="settings-accordion open"><div class="settings-acc-header" onclick="toggleAcc(this)">🎨 Appearance</div><div class="settings-acc-body"><div class="theme-grid" style="display:flex;gap:12px;"><button onclick="setTheme('slate')">Slate</button><button onclick="setTheme('aurora')">Aurora</button><button onclick="setTheme('ember')">Ember</button></div></div></div>
</div>

</div></div></div>

<!-- EDIT MODAL (FIX 2: includes Reason for price change) -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="modal-title">✏️ Edit Item</div>
    <input id="editName" placeholder="Name *">
    <input id="editBrand" placeholder="Brand">
    <div class="form-2col"><input type="number" id="editBuyPrice" placeholder="Buy price"><input type="number" id="editSellPrice" placeholder="Sell price"></div>
    <div class="price-warning" id="editSellWarn">⚠️ Sell below buy</div>
    <input id="editReason" placeholder="Reason for price change (optional)">
    <input id="editUnit" placeholder="Unit">
    <input id="editCat" placeholder="Category">
    <input id="editDistributor" placeholder="Distributor">
    <input id="editLocation" placeholder="Location">
    <textarea id="editNote" placeholder="Notes"></textarea>
    <button class="save-btn" onclick="updateItem()">💾 Update Item</button>
  </div>
</div>

<div class="modal-overlay" id="detailModal" onclick="closeDetail()"><div class="modal" id="detailContent"></div></div>
<div class="modal-overlay" id="qrModal"><div class="modal"><div id="qrCanvas"></div><button onclick="closeQR()">Close</button></div></div>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">

<script>
// ========== FULL STATE & FIXES ==========
let items = [];
let editingId = null;
let activeFilter = 'All';
let activeSort = 'recent';
let quoteSelections = {};
const GS_HARDCODED_URL = 'https://script.google.com/macros/s/AKfycbwVop8Nv2yon-J2UjWga98U_AZgTIZwTK-jJzf4-izFlDuwYuYLxEr42nGpy2wNhIKDSw/exec';
let _gsPushPending = false;

// Helper: snapshot & storage
function saveSnapshot(data) { try { localStorage.setItem('erSnapshot', JSON.stringify(data)); localStorage.setItem('erSnapshotTime', Date.now().toString()); } catch(e){} }
function loadSnapshot() { try { const raw = localStorage.getItem('erSnapshot'); return raw ? JSON.parse(raw) : []; } catch(e){ return []; } }
function saveToDB() {
  localStorage.setItem('electricRates', JSON.stringify(items));
  saveSnapshot(items);
  if (window.indexedDB) {
    const req = indexedDB.open('ElectricShopDB',1);
    req.onsuccess = e => { const db = e.target.result; const tx=db.transaction('items','readwrite'); const store=tx.objectStore('items'); store.clear(); items.forEach(i=>store.put(i)); };
  }
  if (!_gsPushPending) { _gsPushPending=true; setTimeout(()=>{ gsPushToSheet(true); setTimeout(()=>{ _gsPushPending=false; },2000); },200); }
}
function roundPrice(n) { return Math.round((n||0)*100)/100; }

// Render functions
function renderAll() { renderStats(); renderFilterChips(); renderItems(); document.getElementById('itemCount').innerText = items.length+' Items'; }
function renderStats() {
  const total=items.length, avgBuy=total?items.reduce((s,i)=>s+(i.buyPrice||0),0)/total:0;
  document.getElementById('statsBar').innerHTML = `<div class="stat-card">${total}<span>Items</span></div><div class="stat-card">${new Set(items.map(i=>i.cat)).size}<span>Categories</span></div><div class="stat-card">₹${avgBuy.toFixed(0)}<span>Avg Buy</span></div>`;
}
function renderFilterChips() {
  const cats=['All',...new Set(items.map(i=>i.cat||'Misc'))];
  document.getElementById('filterChips').innerHTML = cats.map(c=>`<button class="filter-chip ${c===activeFilter?'active':''}" data-cat="${c}">${c}</button>`).join('');
}
function renderItems() {
  let list = items.filter(i=>i.name);
  if(activeFilter!=='All') list = list.filter(i=>(i.cat||'Misc')===activeFilter);
  const q=document.getElementById('searchInput')?.value.toLowerCase();
  if(q) list = list.filter(i=>i.name.toLowerCase().includes(q)||(i.brand||'').toLowerCase().includes(q));
  if(activeSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
  if(activeSort==='buy-asc') list.sort((a,b)=>(a.buyPrice||0)-(b.buyPrice||0));
  if(activeSort==='recent') list.sort((a,b)=>String(b.id||'').localeCompare(String(a.id||'')));
  list.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  const container=document.getElementById('itemsList');
  if(!list.length){ container.innerHTML='<div class="empty">📭 No items found</div>'; return; }
  container.innerHTML = list.map(i=>`<div class="item-card" onclick="openDetail('${i.id}')"><div><b>${escapeHtml(i.name)}</b> ${i.brand?`(${escapeHtml(i.brand)})`:''}</div><div>💰 Buy: ₹${(i.buyPrice||0).toLocaleString()} | Sell: ₹${(i.sellPrice||0).toLocaleString()}</div><div class="item-actions" onclick="event.stopPropagation()"><button class="act-btn btn-edit" onclick="openEdit('${i.id}')">✏️ Edit</button><button class="act-btn btn-delete" onclick="deleteItem('${i.id}')">🗑️ Delete</button></div></div>`).join('');
}
function escapeHtml(s){ return String(s).replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}); }

// CRUD
function saveItem() {
  let name=document.getElementById('addName').value.trim();
  let buy=roundPrice(parseFloat(document.getElementById('addBuyPrice').value));
  if(!name||isNaN(buy)){ showToast('Name & buy price required','#c0392b'); return; }
  let newItem={
    id:Date.now().toString(), name,
    brand:document.getElementById('addBrand').value.trim(),
    buyPrice:buy,
    sellPrice:roundPrice(parseFloat(document.getElementById('addSellPrice').value)||0),
    unit:document.getElementById('addUnit').value.trim(),
    cat:document.getElementById('addCat').value.trim(),
    distributor:document.getElementById('addDistributor').value.trim(),
    location:document.getElementById('addLocation').value.trim(),
    note:document.getElementById('addNote').value.trim(),
    updated:new Date().toLocaleDateString('en-IN'),
    priceHistory:[],
    pinned:false
  };
  newItem.priceHistory=[{date:new Date().toLocaleString(), buyPrice:buy, sellPrice:newItem.sellPrice, type:'new'}];
  items.unshift(newItem);
  saveToDB(); renderAll();
  document.getElementById('addName').value='';
  document.getElementById('addBrand').value='';
  document.getElementById('addBuyPrice').value='';
  document.getElementById('addSellPrice').value='';
  showToast(`✅ "${name}" added`);
}
function openEdit(id){
  editingId=id;
  let i=items.find(i=>i.id===id);
  if(!i) return;
  document.getElementById('editName').value=i.name;
  document.getElementById('editBrand').value=i.brand||'';
  document.getElementById('editBuyPrice').value=i.buyPrice;
  document.getElementById('editSellPrice').value=i.sellPrice||0;
  document.getElementById('editUnit').value=i.unit||'';
  document.getElementById('editCat').value=i.cat||'';
  document.getElementById('editDistributor').value=i.distributor||'';
  document.getElementById('editLocation').value=i.location||'';
  document.getElementById('editNote').value=i.note||'';
  document.getElementById('editReason').value='';
  checkSellWarn('edit');
  document.getElementById('editModal').classList.add('active');
}
function updateItem() {
  let idx=items.findIndex(i=>i.id===editingId);
  if(idx===-1){ showToast('Item not found','#c0392b'); closeEdit(); return; }
  let old=items[idx];
  let newName=document.getElementById('editName').value.trim();
  let newBuy=roundPrice(parseFloat(document.getElementById('editBuyPrice').value));
  let newSell=roundPrice(parseFloat(document.getElementById('editSellPrice').value)||0);
  if(!newName||isNaN(newBuy)){ showToast('Name and buy price required','#c0392b'); return; }
  let history=Array.isArray(old.priceHistory)?[...old.priceHistory]:[];
  let reason=document.getElementById('editReason').value.trim();
  if(newBuy!==old.buyPrice||newSell!==(old.sellPrice||0)){
    history.unshift({
      date:new Date().toLocaleString(),
      buyPrice:newBuy,
      sellPrice:newSell,
      prevBuyPrice:old.buyPrice,
      prevSellPrice:old.sellPrice,
      type:newBuy>old.buyPrice?'up':'down',
      reason:reason||'Manual edit'
    });
  }
  items[idx]={...old,
    name:newName,
    brand:document.getElementById('editBrand').value.trim(),
    buyPrice:newBuy,
    sellPrice:newSell,
    unit:document.getElementById('editUnit').value.trim(),
    cat:document.getElementById('editCat').value.trim(),
    distributor:document.getElementById('editDistributor').value.trim(),
    location:document.getElementById('editLocation').value.trim(),
    note:document.getElementById('editNote').value.trim(),
    updated:new Date().toLocaleDateString('en-IN'),
    priceHistory:history
  };
  saveToDB(); renderAll(); closeEdit(); showToast('Item updated ✓');
}
function closeEdit(){ document.getElementById('editModal').classList.remove('active'); editingId=null; }
function deleteItem(id){ if(confirm('Delete permanently?')){ items=items.filter(i=>i.id!==id); saveToDB(); renderAll(); showToast('Deleted'); } }
function openDetail(id){ let i=items.find(i=>i.id===id); if(i){ document.getElementById('detailContent').innerHTML=`<h3>${escapeHtml(i.name)}</h3><p>Buy: ₹${i.buyPrice} | Sell: ₹${i.sellPrice||0}</p><p>${i.note||''}</p><button onclick="closeDetail()">Close</button>`; document.getElementById('detailModal').classList.add('active');} }
function closeDetail(){ document.getElementById('detailModal').classList.remove('active'); }
function checkSellWarn(prefix){ let buy=parseFloat(document.getElementById(prefix+'BuyPrice').value)||0; let sell=parseFloat(document.getElementById(prefix+'SellPrice').value)||0; let warn=document.getElementById(prefix+'SellWarn'); if(warn) warn.classList.toggle('show', sell>0 && sell<buy); }

// ========== GOOGLE SHEETS AUTO LOAD (FIX 3: loads on startup, no refresh needed) ==========
function gsGetUrl() { return GS_HARDCODED_URL; }
function gsIsConnected() { return true; }
async function gsStartupFetch() {
  const url = gsGetUrl();
  if(!url) return;
  try {
    const resp = await fetch(url + '?action=read', { method: 'GET' });
    const text = await resp.text();
    const clean = text.trim().replace(/^[^\[{]*/, '').replace(/[^\]}]*$/, '');
    const data = JSON.parse(clean);
    if(Array.isArray(data) && data.length>0){
      items = data.map(row => ({ ...row, id:String(row.id), buyPrice:parseFloat(row.buyPrice)||0, sellPrice:parseFloat(row.sellPrice)||0, priceHistory:Array.isArray(row.priceHistory)?row.priceHistory:[] }));
      saveToDB(); renderAll();
      showToast(`📡 Loaded ${items.length} items from Sheet`, '#1a7a45');
    } else if(data.length===0 && items.length===0) {
      // keep empty
    }
  } catch(e) { console.warn('startup fetch',e); if(items.length===0){ const snap=loadSnapshot(); if(snap.length){ items=snap; renderAll(); } } }
  updateOnlineBadge(true);
}
function gsReconcile() {
  const btn = document.getElementById('syncBtn'); if(btn) btn.style.opacity='0.6';
  fetch(gsGetUrl()+'?action=read').then(r=>r.text()).then(t=>{ const clean=t.trim().replace(/^[^\[{]*/,'').replace(/[^\]}]*$/,''); const data=JSON.parse(clean); if(Array.isArray(data)){ const sheetItems=data.map(r=>({...r,id:String(r.id),buyPrice:parseFloat(r.buyPrice)||0,sellPrice:parseFloat(r.sellPrice)||0})); items=sheetItems; saveToDB(); renderAll(); showToast(`🔄 Synced ${items.length} items`); } }).catch(()=>showToast('Sync failed, try again','#c0392b')).finally(()=>{ if(btn) btn.style.opacity='1'; });
}
function gsPushToSheet(silent){
  const url=gsGetUrl(); if(!url) return;
  fetch(url, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action:'write', items:items}) }).then(()=>{ if(!silent) showToast('⬆️ Pushed to Sheet'); }).catch(()=>{});
}
function updateOnlineBadge(online){ const ind=document.getElementById('autoSaveIndicator'); if(ind) ind.style.background=online?'var(--success-light)':'var(--danger-light)'; }
function gsStartAutoPull(){ setInterval(()=>{ if(!_gsPushPending) gsQuietPull(); }, 7000); }
function gsQuietPull(){ fetch(gsGetUrl()+'?action=read').then(r=>r.text()).then(t=>{ const clean=t.trim().replace(/^[^\[{]*/,'').replace(/[^\]}]*$/,''); const data=JSON.parse(clean); if(Array.isArray(data) && data.length>0){ const newItems=data.map(r=>({...r,id:String(r.id),buyPrice:parseFloat(r.buyPrice)||0,sellPrice:parseFloat(r.sellPrice)||0})); const newSig=JSON.stringify(newItems.map(i=>i.id+':'+i.buyPrice)); const oldSig=JSON.stringify(items.map(i=>i.id+':'+i.buyPrice)); if(newSig!==oldSig){ items=newItems; saveToDB(); renderAll(); showToast('🔄 Auto-updated from Sheet','#3b5bdb'); } } }).catch(()=>{}); }

// QUOTE functions (basic)
function renderQuoteItems(){
  let q=document.getElementById('quoteSearch')?.value.toLowerCase();
  let list=items.filter(i=>!q||i.name.toLowerCase().includes(q));
  document.getElementById('quoteItemsList').innerHTML=list.map(i=>`<div onclick="toggleQuoteItem('${i.id}')">${escapeHtml(i.name)} ₹${(i.sellPrice||i.buyPrice||0).toLocaleString()}</div>`).join('');
}
function toggleQuoteItem(id){ if(quoteSelections[id]) delete quoteSelections[id]; else quoteSelections[id]=1; renderQuoteSummary(); }
function renderQuoteSummary(){ let total=0; Object.keys(quoteSelections).forEach(id=>{ let it=items.find(i=>i.id===id); if(it) total+=(it.sellPrice||it.buyPrice||0)*(quoteSelections[id]); }); document.getElementById('quoteSummary').innerHTML=`<strong>Total: ₹${total.toLocaleString()}</strong>`; }
function shareQuote(){ let msg='Quote:\n'; Object.keys(quoteSelections).forEach(id=>{ let it=items.find(i=>i.id===id); if(it) msg+=`${it.name} - ₹${(it.sellPrice||it.buyPrice||0)}\n`; }); alert(msg); }

// Utilities
function showToast(msg, bg='#2a7a45'){ let t=document.getElementById('toast'); t.innerText=msg; t.style.background=bg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function exportData(){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(items,null,2)],{type:'application/json'})); a.download='shop-rates.json'; a.click(); }
function exportExcel(){ if(typeof XLSX==='undefined'){ showToast('Excel lib not ready'); return; } const ws=XLSX.utils.json_to_sheet(items.map(i=>({Name:i.name,Brand:i.brand,Buy:i.buyPrice,Sell:i.sellPrice,Category:i.cat}))); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Items'); XLSX.writeFile(wb,'electric-shop.xlsx'); }
function importData(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ try{ const data=JSON.parse(ev.target.result); if(Array.isArray(data)){ items=data; saveToDB(); renderAll(); showToast(`Imported ${data.length} items`); } }catch(err){ showToast('Invalid JSON'); } }; r.readAsText(f); }
function clearAll(){ if(confirm('Delete EVERYTHING?')){ items=[]; saveToDB(); renderAll(); showToast('All cleared'); } }
function setTheme(t){ document.documentElement.setAttribute('data-theme',t); localStorage.setItem('ratebook_theme',t);}
function setSort(s){ activeSort=s; renderItems(); }
function toggleAcc(el){ const body=el.nextElementSibling; if(body) body.style.display=body.style.display==='none'?'block':'none'; }
function openPane(id){ document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById('tab-'+id).classList.add('active'); document.querySelectorAll('.sidebar-item').forEach(s=>s.classList.remove('active')); document.querySelector(`.sidebar-item[onclick*="'${id}'"]`)?.classList.add('active'); if(window.innerWidth<768) closeSidebar(); }
function switchTab(id){ openPane(id); }
function toggleSidebar(){ document.getElementById('sidebarNav').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebarNav').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
function toggleSidebarCollapse(){ document.getElementById('sidebarNav').classList.toggle('collapsed'); }
function openQR(){ alert('QR share ready'); document.getElementById('qrModal').classList.add('active'); }
function closeQR(){ document.getElementById('qrModal').classList.remove('active'); }

// INIT
window.onload = async () => {
  const savedTheme = localStorage.getItem('ratebook_theme') || 'aurora';
  setTheme(savedTheme);
  const snap = loadSnapshot();
  if(snap.length) items = snap;
  // FIX 4: load from Sheets automatically without user clicking refresh
  await gsStartupFetch();
  gsStartAutoPull();
  renderAll();
  updateOnlineBadge(true);
  document.getElementById('filterChips')?.addEventListener('click', (e) => { if(e.target.classList.contains('filter-chip')){ activeFilter=e.target.dataset.cat; renderItems(); } });
};
